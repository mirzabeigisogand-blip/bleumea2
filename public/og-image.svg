<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="50%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="280" fill="url(#card)"/>
  <g transform="translate(600 200)">
    <rect x="-80" y="-80" width="160" height="160" rx="36" fill="white" fill-opacity="0.95"/>
    <text x="0" y="40" font-family="Tahoma, sans-serif" font-size="120" font-weight="bold" fill="#047857" text-anchor="middle">ب</text>
  </g>
  <text x="600" y="430" font-family="Tahoma, sans-serif" font-size="86" font-weight="bold" fill="white" text-anchor="middle" direction="rtl">بلومیا</text>
  <text x="600" y="500" font-family="Tahoma, sans-serif" font-size="32" fill="#a7f3d0" text-anchor="middle" direction="rtl">کتابخانهٔ شعر و ترانهٔ جهانی</text>
  <text x="600" y="560" font-family="Tahoma, sans-serif" font-size="22" fill="#6ee7b7" text-anchor="middle" direction="rtl">۱۴ شعر · ۹ زبان · ترجمهٔ شعری فارسی</text>
</svg>
